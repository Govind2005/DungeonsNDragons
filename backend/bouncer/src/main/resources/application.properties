spring.application.name=bouncer
server.port=${PORT:8080}

spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}

spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

jwt.secret=${JWT_SECRET}
jwt.expiry-hours=24

services.lobby.url=${SERVICES_LOBBY_URL:http://localhost:8081}
services.referee.url=${SERVICES_REFEREE_URL:http://localhost:8082}
services.vault.url=${SERVICES_VAULT_URL:http://localhost:8083}

redis.match-channel-prefix=broadcast:match:

logging.level.com.dungeonsNdragons=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.socket=WARN
