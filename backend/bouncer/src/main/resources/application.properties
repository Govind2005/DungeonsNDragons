spring.application.name=bouncer
server.port=8080

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

jwt.secret=${JWT_SECRET:change-me-in-production-use-256-bit-key}
jwt.expiry-hours=24

services.lobby.url=${LOBBY_URL:http://localhost:8081}
services.referee.url=${REFEREE_URL:http://localhost:8082}
services.vault.url=${VAULT_URL:http://localhost:8083}

redis.match-channel-prefix=broadcast:match:

logging.level.com.dnd=DEBUG
logging.level.org.springframework.web.socket=INFO