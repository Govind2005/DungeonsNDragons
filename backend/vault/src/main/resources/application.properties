spring.application.name=vault

server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/dnd_game
spring.datasource.username=${DB_USER:dnd_user}
spring.datasource.password=${DB_PASS:dnd_pass}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.com.dnd=DEBUG
logging.level.org.springframework.web=INFO