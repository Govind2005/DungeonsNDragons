spring.application.name=scribe

server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/dnd
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:juniorjain}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

services.vault.url=${VAULT_URL:http://localhost:8083}

xp.base-win=100
xp.base-loss=25
xp.kill-bonus=15
xp.turn-efficiency-bonus=5

logging.level.com.dnd=DEBUG
